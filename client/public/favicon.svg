<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Premium Gradient -->
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14b8a6" />
      <stop offset="50%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#14b8a6" flood-opacity="0.4" />
    </filter>
  </defs>
  
  <!-- Outer circle with glass/gradient border -->
  <circle cx="50" cy="50" r="46" fill="#0c0f14" stroke="url(#glow)" stroke-width="3" />
  
  <!-- Subtle inner radial details representing watch dial ticks -->
  <circle cx="50" cy="50" r="38" fill="none" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="2 6" opacity="0.4" />
  
  <!-- Play triangle / pointer merged with watch hand styling -->
  <g filter="url(#shadow)">
    <!-- Elegant Play Button -->
    <path d="M42 35 L68 50 L42 65 Z" fill="url(#glow)" stroke="#2dd4bf" stroke-width="1.5" stroke-linejoin="round" />
  </g>
  
  <!-- Watch center tick -->
  <circle cx="42" cy="50" r="2.5" fill="#ffffff" />
</svg>
